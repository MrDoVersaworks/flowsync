name: FlowSync CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-audit:
    name: Backend — Type Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
      - run: npm ci
      - name: Type Check
        run: npx tsc --noEmit
      - name: Build Check
        run: npm run build

  frontend-audit:
    name: Frontend — Type Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - run: npm ci
      - name: Type Check
        run: npx tsc --noEmit
      - name: Build Check
        run: npm run build

  e2e-tests:
    name: E2E — Playwright Suite
    runs-on: ubuntu-latest
    needs: [backend-audit, frontend-audit]
    env:
      # Backend environment variables required for the live server
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      AES_ENCRYPTION_KEY: ${{ secrets.AES_ENCRYPTION_KEY }}
      PORT: 5001
      NODE_ENV: test
      CORS_ORIGIN: http://localhost:3001
      # Frontend environment variable pointing to the live test backend
      NEXT_PUBLIC_API_URL: http://localhost:5001
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Start Backend Server
        working-directory: ./backend
        run: npm run dev &

      - name: Wait for Backend to be Ready
        run: npx wait-on http://localhost:5001/health --timeout 30000

      - name: Run Playwright Tests
        working-directory: ./frontend
        run: npx playwright test --project=chromium --workers=1

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

